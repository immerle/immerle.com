            SetupToken is required only when the server was started with
            auth.require_setup_token=true.
          type: string
        username:
          example: kilian
          type: string
      type: object
    immerle.SetupStatusDTO:
      properties:
        initialized:
          example: false
          type: boolean
        needsSetup:
          example: true
          type: boolean
        setupTokenRequired:
          example: false
          type: boolean
        userCount:
          example: 0
          type: integer
      type: object
    immerle.ThemeDTO:
      properties:
        accentColor:
          example: '#3b82f6'
          type: string
      type: object
    immerle.UserDTO:
      properties:
        displayName:
          example: Kilian Smiti
          type: string
        id:
          type: string
        isAdmin:
          example: true
          type: boolean
        username:
          example: kilian
          type: string
      type: object
    immerle.addCollaboratorBody:
      properties:
        username:
          type: string
      type: object
    immerle.apiError:
      properties:
        code:
          type: string
        fields:
          items:
            $ref: '#/components/schemas/immerle.fieldError'
          type: array
          uniqueItems: false
        message:
          type: string
        params:
          additionalProperties: {}
          description: i18n interpolation values; always present ({} when none)
          type: object
      type: object
    immerle.cleanupUpdateRequest:
      properties:
        enabled:
          type: boolean
      type: object
    immerle.createJamRequest:
      properties:
        name:
          type: string
        trackIds:
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    immerle.createTokenRequest:
      properties:
        expiresAt:
          description: >-
            ExpiresAt is an optional RFC3339 timestamp; omit or null for a token
            that

            never expires.
          type: string
        name:
          type: string
      type: object
    immerle.errorResponse:
      properties:
        error:
          $ref: '#/components/schemas/immerle.apiError'
      type: object
    immerle.fieldError:
      properties:
        field:
          type: string
        message:
          type: string
      type: object
    immerle.friendRequestBody:
      properties:
        username:
          type: string
      type: object
    immerle.loginRequest:
      properties:
        device:
          description: >-
            Device is an optional human label for the session (defaults to the
            username).
          type: string
        password:
          type: string
        salt:
          type: string
        token:
          description: >-
            Token + Salt allow Subsonic-style token auth instead of a raw
            password.
          type: string
        username:
          type: string
      type: object
    immerle.reorderRequest:
      properties:
        order:
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    immerle.resolveItemRequest:
      properties:
        query:
          type: string
      type: object
    immerle.setEnabledRequest:
      properties:
        enabled:
          type: boolean
      type: object
    immerle.startImportRequest:
      properties:
        ref:
          type: string
        source:
          type: string
      type: object
    immerle.updateAccountRequest:
      properties:
        displayName:
          type: string
        email:
          type: string
        language:
          type: string
      type: object
    immerle.updateJamRequest:
      properties:
        currentTrackId:
          type: string
        position:
          type: integer
        state:
          type: string
        trackIds:
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    immerle.updateThemeRequest:
      properties:
        accentColor:
          type: string
      type: object
    immerle.upsertProviderRequest:
      properties:
        config:
          type: string
        enabled:
          type: boolean
        endpoint:
          type: string
        kind:
          type: string
        name:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      description: Type "Bearer <token>" where token is a device JWT or API token.
      in: header
      name: Authorization
      type: apiKey
info:
  contact:
    name: immerle
  description: |-
    Native immerle REST API (first-run setup, capability
    discovery, friends, activity feed, collaborative playlists and
    synchronized Jam sessions) that complements the Subsonic /
    OpenSubsonic API served under /rest/.

    Served under /api/v1. Authenticated endpoints require a Bearer
    token in the Authorization header — a device JWT (obtained from
    POST /auth/sessions) or a personal API token. Setup, capability
    discovery and session creation are unauthenticated.
  license:
    name: See repository
  title: immerle extension API
  version: 1.0.0
externalDocs:
  description: ''
  url: ''
paths:
  /activity:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/immerle.ActivityEventDTO'
                type: array
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Activity feed
      tags:
        - activity
  /admin/cleanup:
    get:
      description: Admin only. Reports the eviction sweep state.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.CleanupStatusDTO'
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Get the cleanup sweep state
      tags:
        - admin
    put:
      description: >-
        Admin only. Enables or disables the background eviction sweep at runtime
        (persisted; hot).
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - $ref: '#/components/schemas/immerle.cleanupUpdateRequest'
                  summary: body
                  description: Enable or disable the sweep
        description: Enable or disable the sweep
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.CleanupStatusDTO'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Toggle the cleanup sweep
      tags:
        - admin
  /admin/cleanup/runs:
    post:
      description: >-
        Admin only. Runs one eviction pass immediately and returns how many
        provider downloads were removed. Works even when the background sweep is
        disabled.
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.CleanupRunDTO'
          description: Created
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Run the cleanup sweep now
      tags:
        - admin
  /admin/providers:
    get:
      description: >-
        Admin only. Lists configured providers (built-in and dynamic) with their
        live status.
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/immerle.ProviderDTO'
                type: array
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: List on-demand providers
      tags:
        - admin
    post:
      description: >-
        Admin only. With only an endpoint (no name), creates an HTTP provider
        from its URL by probing /capabilities. With a name, updates it (HTTP
        config is validated against /capabilities).
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - $ref: '#/components/schemas/immerle.upsertProviderRequest'
                  summary: body
                  description: Provider config
        description: Provider config
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.ProviderDTO'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Create or update an on-demand provider
      tags:
        - admin
  /admin/providers/order:
    put:
      description: >-
        Admin only. Sets the provider priority order (lower = higher priority).
        `order` lists every provider name, each exactly once. Order also decides
        which provider search falls back to when no explicit default is set.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - $ref: '#/components/schemas/immerle.reorderRequest'
                  summary: body
                  description: Provider names in the desired order
        description: Provider names in the desired order
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/immerle.ProviderDTO'
                type: array
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
