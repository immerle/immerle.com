          schema:
            type: string
      responses:
        '204':
          description: unsubscribed
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
      security:
