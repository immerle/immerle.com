              example: 2592000
              type: integer
          type: object
        cleanup:
          properties:
            enabled:
              example: true
              type: boolean
            intervalSeconds:
              example: 21600
              type: integer
            maxAgeSeconds:
              example: 2592000
              type: integer
          type: object
        federation:
