info:
  contact:
    name: immerle
  description: |-
    Native immerle REST API (first-run setup, capability
    discovery, friends, activity feed, collaborative playlists and
    synchronized Jam sessions) that complements the Subsonic /
    OpenSubsonic API served under /rest/.

    Served under /api/v1. Authenticated endpoints require a Bearer
    token in the Authorization header — a device JWT (obtained from
    POST /auth/sessions) or a personal API token. Setup, capability
    discovery and session creation are unauthenticated.
  license:
    name: See repository
  title: immerle extension API
  version: 1.0.0
externalDocs:
  description: ''
  url: ''
paths:
  /activity:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/immerle.ActivityEventDTO'
                type: array
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Activity feed
      tags:
        - activity
  /admin/cleanup:
    get:
      description: Admin only. Reports the eviction sweep state.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.CleanupStatusDTO'
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Get the cleanup sweep state
      tags:
        - admin
    put:
      description: >-
        Admin only. Enables or disables the background eviction sweep at runtime
        (persisted; hot).
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - $ref: '#/components/schemas/immerle.cleanupUpdateRequest'
                  summary: body
                  description: Enable or disable the sweep
        description: Enable or disable the sweep
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.CleanupStatusDTO'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Toggle the cleanup sweep
      tags:
        - admin
  /admin/cleanup/runs:
    post:
      description: >-
        Admin only. Runs one eviction pass immediately and returns how many
        provider downloads were removed. Works even when the background sweep is
        disabled.
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.CleanupRunDTO'
          description: Created
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Run the cleanup sweep now
      tags:
        - admin
  /admin/federation:
    delete:
      description: >-
        Admin only. Deletes this instance's data on the hub (best-effort) and
        clears the locally stored hub identity, returning the instance to the
        unlinked state. Returns the refreshed runtime settings.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.SettingsDTO'
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Unlink this instance from the hub
      tags:
        - admin
    get:
      description: >-
        Admin only. Fetches this instance's current name and sqid handle from
        the hub (the source of truth) and persists them, then returns the
        refreshed runtime settings. The HTTP exchange runs server-side.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.SettingsDTO'
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Conflict
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Gateway
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Get the live hub instance profile
      tags:
        - admin
    patch:
      description: >-
        Admin only. Pushes the instance name and sqid (the editable, unique hub
        handle) to the hub, which validates sqid uniqueness, then persists the
        hub-canonical values. The HTTP exchange runs server-side. Returns the
        refreshed runtime settings.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - $ref: '#/components/schemas/immerle.FederationUpdateDTO'
                  summary: body
                  description: Instance name and sqid
        description: Instance name and sqid
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.SettingsDTO'
          description: OK
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Conflict
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Gateway
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Update this instance on the hub
      tags:
        - admin
  /admin/federation/instances:
    get:
      description: >-
        Admin only. Searches the hub for other instances by exact sqid or name
        (the hub excludes this instance and revoked ones). The HTTP exchange
        runs server-side.
      parameters:
        - description: Search query (sqid or name)
          in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.FederationInstancesDTO'
          description: OK
        '401':
          content:
            application/json:
              schema:
