  /tokens:
    get:
      description: Lists the caller's active personal access tokens (no secrets).
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/immerle.APITokenDTO'
                type: array
          description: OK
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: List API tokens
      tags:
        - tokens
    post:
      description: >-
        Creates a personal access token scoped to the caller. The secret is
        returned ONCE — store it now. Use it as "Authorization: Bearer <token>".
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - $ref: '#/components/schemas/immerle.createTokenRequest'
                  summary: body
                  description: Token name and optional expiry
        description: Token name and optional expiry
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.CreateTokenDTO'
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Create an API token
      tags:
        - tokens
