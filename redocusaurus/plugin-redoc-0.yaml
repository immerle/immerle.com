        description: User to grant edit rights
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.apiError'
          description: added
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Request
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Unauthorized
        '403':
