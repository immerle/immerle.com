components:
  schemas:
    immerle.APITokenDTO:
      properties:
        createdAt:
          example: '2026-06-15T09:00:00Z'
          type: string
        expiresAt:
          type: string
        id:
          type: string
        lastUsedAt:
          type: string
        name:
          example: my-cli
          type: string
        prefix:
          example: gsk_AbC12
          type: string
      type: object
    immerle.AccountDTO:
      properties:
        displayName:
          example: Bob Marley
          type: string
        email:
          example: bob@example.com
          type: string
        id:
          type: string
        isAdmin:
          example: false
          type: boolean
        language:
          example: fr
          type: string
        username:
          example: bob
          type: string
      type: object
    immerle.ActivityEventDTO:
      properties:
        createdAt:
          example: '2026-06-15T09:00:00Z'
          type: string
        displayName:
          example: Bob Marley
          type: string
        id:
          type: string
        item:
          $ref: '#/components/schemas/immerle.ActivityItemDTO'
        itemId:
          type: string
        itemType:
          example: track
          type: string
        privacy:
          example: friends
          type: string
        type:
          example: listen
          type: string
        userId:
          type: string
        username:
          example: bob
          type: string
      type: object
    immerle.ActivityItemDTO:
      properties:
        album:
          example: Discovery
          type: string
        albumId:
          type: string
        artist:
          example: Daft Punk
          type: string
        artistId:
          type: string
        coverArt:
          type: string
        duration:
          example: 320
          type: integer
        title:
          example: One More Time
          type: string
        year:
          example: 2001
          type: integer
      type: object
    immerle.CapabilitiesDTO:
      properties:
        capabilities:
          additionalProperties:
            $ref: '#/components/schemas/immerle.CapabilityDTO'
          type: object
        protocolVersion:
          example: 1.0.0
          type: string
        server:
          example: immerle
          type: string
      type: object
    immerle.CapabilityDTO:
      properties:
        version:
          example: 1
          type: integer
      type: object
    immerle.CleanupRunDTO:
      properties:
        removed:
          example: 3
          type: integer
      type: object
    immerle.CleanupStatusDTO:
      properties:
        enabled:
          example: true
          type: boolean
        intervalSeconds:
          example: 21600
          type: integer
        maxAgeSeconds:
          example: 2592000
          type: integer
      type: object
    immerle.CreateTokenDTO:
      properties:
        id:
          type: string
        name:
          example: my-cli
          type: string
        prefix:
          example: gsk_AbC12
          type: string
        token:
          example: gsk_AbC12...full-secret
          type: string
      type: object
    immerle.DeviceDTO:
      properties:
        createdAt:
          type: string
        expiresAt:
          type: string
        id:
          type: string
        lastIp:
          type: string
        lastSeen:
          type: string
        name:
          example: Pixel 8
          type: string
        userAgent:
          type: string
      type: object
    immerle.FederationInstancesDTO:
      properties:
        instances:
          items:
            $ref: '#/components/schemas/immerle.InstanceSummaryDTO'
          type: array
          uniqueItems: false
      type: object
    immerle.FederationSubscriptionsDTO:
      properties:
        subscriptions:
          items:
            $ref: '#/components/schemas/immerle.InstanceSummaryDTO'
          type: array
          uniqueItems: false
      type: object
    immerle.FederationUpdateDTO:
      properties:
        name:
          example: My living-room immerle
          type: string
        sqid:
          example: my-node
          type: string
      type: object
    immerle.FriendDTO:
      properties:
        displayName:
          example: Bob Marley
          type: string
        id:
          type: string
        username:
          example: bob
          type: string
      type: object
    immerle.ImportDTO:
      properties:
        doubtful:
          example: 2
          type: integer
        error:
          type: string
        failed:
          example: 0
          type: integer
        id:
          type: string
        items:
          items:
            $ref: '#/components/schemas/immerle.ImportItemDTO'
          type: array
          uniqueItems: false
        matched:
          example: 38
          type: integer
        missing:
          example: 2
          type: integer
        playlistId:
          type: string
        source:
          example: spotify
          type: string
        sourcePlaylistName:
          type: string
        sourceRef:
          type: string
        status:
          example: completed
          type: string
        total:
          example: 42
          type: integer
      type: object
    immerle.ImportItemDTO:
      properties:
        candidateCoverArt:
          type: string
        candidateTrackId:
          description: >-
            CandidateTrackID / CandidateCoverArt let a client preview a doubtful
            item:

            play the candidate (stream accepts the remote track id) and show its
            cover.
          type: string
        confidence:
          example: 0.62
          type: number
        id:
          type: string
        matchedTrackId:
          type: string
        note:
          type: string
        position:
          type: integer
        resolvedArtist:
          type: string
        resolvedTitle:
          type: string
        sourceAlbum:
          type: string
        sourceArtist:
          example: Daft Punk
          type: string
        sourceTitle:
          example: Da Funk
          type: string
        status:
          example: matched
          type: string
      type: object
    immerle.ImportSourceDTO:
      properties:
        configured:
          example: true
          type: boolean
        name:
          example: spotify
          type: string
      type: object
    immerle.InstanceSummaryDTO:
      properties:
        id:
          example: 3f1c2d4e-5a6b-7c8d-9e0f-1a2b3c4d5e6f
          type: string
        lastSeenAt:
          type: string
        name:
          example: A friend's immerle
          type: string
        region:
          example: eu
          type: string
        sqid:
          example: other-node
          type: string
      type: object
    immerle.JamDTO:
      properties:
        participants:
          items:
            $ref: '#/components/schemas/immerle.JamParticipantDTO'
          type: array
          uniqueItems: false
        session:
          $ref: '#/components/schemas/immerle.JamSessionDTO'
      type: object
    immerle.JamParticipantDTO:
      properties:
        joinedAt:
          example: '2026-06-15T09:00:00Z'
          type: string
        sessionId:
          type: string
        userId:
          type: string
        username:
          example: bob
          type: string
      type: object
    immerle.JamSessionDTO:
      properties:
        currentTrackId:
          type: string
        hostId:
          type: string
        id:
          type: string
        name:
          example: Friday Night
          type: string
        position:
          example: 42000
          type: integer
        state:
          example: playing
          type: string
        trackIds:
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    immerle.LibraryStatsDTO:
      properties:
        albums:
          example: 128
          type: integer
        artists:
          example: 42
          type: integer
        totalDuration:
          example: 432000
          type: integer
        totalSize:
          example: 9663676416
          type: integer
        tracks:
          example: 1560
          type: integer
        updatedAt:
          example: '2026-06-17T09:00:00Z'
          type: string
      type: object
    immerle.LoginDTO:
      properties:
        device:
          $ref: '#/components/schemas/immerle.DeviceDTO'
        token:
          example: eyJhbGciOiJIUzI1Ni...
          type: string
      type: object
    immerle.OkResponse:
      properties:
        ok:
          example: true
          type: boolean
      type: object
    immerle.PendingFriendDTO:
      properties:
        displayName:
          example: Alice Coltrane
          type: string
        id:
          type: string
        since:
          example: '2026-06-15T09:00:00Z'
          type: string
        username:
          example: alice
          type: string
      type: object
    immerle.ProfileDTO:
      properties:
        activity:
          items:
            $ref: '#/components/schemas/immerle.ActivityEventDTO'
          type: array
          uniqueItems: false
        isFriend:
          example: true
          type: boolean
        isSelf:
          example: false
          type: boolean
        playlists:
          items:
            $ref: '#/components/schemas/immerle.ProfilePlaylistDTO'
          type: array
          uniqueItems: false
        user:
          properties:
            displayName:
              example: Bob Marley
              type: string
            id:
              type: string
            isAdmin:
              example: false
              type: boolean
            username:
              example: bob
              type: string
          type: object
      type: object
    immerle.ProfilePlaylistDTO:
      properties:
        comment:
          type: string
        coverArt:
          type: string
        coverArts:
          items:
            type: string
          type: array
          uniqueItems: false
        duration:
          example: 5400
          type: integer
        id:
          type: string
        name:
          example: Summer vibes
          type: string
        songCount:
          example: 24
          type: integer
      type: object
    immerle.ProviderDTO:
      properties:
        active:
          example: true
          type: boolean
        builtin:
          example: false
          type: boolean
        config:
          example: '{"headers":{"Authorization":"Bearer x"}}'
          type: string
        deletable:
          example: true
          type: boolean
        enabled:
          example: true
          type: boolean
        endpoint:
          example: https://my-service.internal
          type: string
        kind:
          example: http
          type: string
        name:
          example: manual
          type: string
        sortOrder:
          example: 3
          type: integer
        version:
          description: >-
            Version is the remote's live protocol version (HTTP providers), null
            when

            unknown or for built-ins.
          example: 1
          type: integer
      type: object
    immerle.ProviderLogDTO:
      properties:
        action:
          example: download
          type: string
        createdAt:
          example: '2026-06-18T20:00:00Z'
          type: string
        id:
          type: string
        level:
          example: error
          type: string
        message:
          example: unexpected status 404
          type: string
        provider:
          example: free-music-archive
          type: string
      type: object
    immerle.PublicPlaylistDTO:
      properties:
        comment:
          type: string
        coverArt:
          type: string
        coverArts:
          items:
            type: string
          type: array
          uniqueItems: false
        duration:
          type: integer
        id:
          type: string
        name:
          example: Editorial Picks
          type: string
        owner:
          example: alice
          type: string
        songCount:
          type: integer
        subscribed:
          type: boolean
      type: object
    immerle.RuntimeSettingsDTO:
      properties:
        auth:
          properties:
            deviceTokenTtlSeconds:
              example: 2592000
              type: integer
          type: object
        cleanup:
          properties:
            enabled:
              example: true
              type: boolean
            intervalSeconds:
              example: 21600
              type: integer
            maxAgeSeconds:
              example: 2592000
              type: integer
          type: object
        federation:
          properties:
            exportScrobbles:
              type: boolean
            instanceId:
              description: >-
                InstanceID is the hub-assigned fixed UUID (read-only). Sqid is
                the

                editable handle. PrivateKey is never returned (redacted
                server-side).
              example: 3f1c2d4e-5a6b-7c8d-9e0f-1a2b3c4d5e6f
              type: string
            instanceName:
              example: My living-room immerle
              type: string
            resolveMissing:
              type: boolean
            sqid:
              example: my-node
              type: string
            syncPlaylists:
              type: boolean
            userId:
              description: >-
                Federation is active whenever linked (instanceId set); no enable
                flag.
              example: 6f1c2b8e-1f0a-4f9b-9c3a-1e2d3c4b5a6f
              type: string
          type: object
        ldap:
          properties:
            bindDnTemplate:
              example: uid=%s,ou=people,dc=example,dc=com
              type: string
            enabled:
              example: false
              type: boolean
            url:
              example: ldaps://ldap.example.com:636
              type: string
          type: object
        logs:
          properties:
            retentionDays:
              example: 30
              type: integer
          type: object
        providers:
          properties:
            autoDownloadOnPlay:
              example: true
              type: boolean
            searchTimeoutSeconds:
              example: 3
              type: integer
          type: object
        scan:
          properties:
            intervalSeconds:
              example: 3600
              type: integer
            watch:
              example: true
              type: boolean
          type: object
        server:
          properties:
            corsAllowedOrigins:
              example:
                - '*'
              items:
                type: string
              type: array
              uniqueItems: false
          type: object
        transcode:
          properties:
            ffmpegPath:
              example: ffmpeg
              type: string
            ffprobePath:
              example: ffprobe
              type: string
            profiles:
              items:
                properties:
                  bitRate:
                    example: 192
                    type: integer
                  ffmpegArgs:
                    type: string
                  format:
                    example: mp3
                    type: string
                  name:
                    example: mp3
                    type: string
                type: object
              type: array
              uniqueItems: false
          type: object
      type: object
    immerle.SettingsDTO:
      properties:
        pendingRestart:
          items:
            type: string
          type: array
          uniqueItems: false
        restartRequired:
          example: false
          type: boolean
        settings:
          $ref: '#/components/schemas/immerle.RuntimeSettingsDTO'
      type: object
    immerle.SetupInitRequest:
      properties:
        displayName:
          description: >-
            DisplayName is an optional free-text name shown in the UI (falls
            back to

            the username when empty).
          example: Kilian Smiti
          type: string
        email:
          example: me@example.com
          type: string
        password:
          example: a-strong-password
          type: string
        setupToken:
          description: |-
            SetupToken is required only when the server was started with
            auth.require_setup_token=true.
          type: string
        username:
          example: kilian
          type: string
      type: object
    immerle.SetupStatusDTO:
      properties:
        initialized:
          example: false
          type: boolean
        needsSetup:
          example: true
          type: boolean
        setupTokenRequired:
          example: false
          type: boolean
        userCount:
          example: 0
          type: integer
      type: object
    immerle.SmartConditionDTO:
      properties:
        field:
          example: genre
          type: string
        op:
          example: is
          type: string
        value:
          example: House
          type: string
      type: object
    immerle.SmartPlaylistDTO:
      properties:
        id:
          type: string
        name:
          example: Heavy rotation
          type: string
        rules:
          $ref: '#/components/schemas/immerle.SmartRulesDTO'
      type: object
    immerle.SmartPlaylistRequestDTO:
      properties:
        name:
          example: Heavy rotation
          type: string
        rules:
          $ref: '#/components/schemas/immerle.SmartRulesDTO'
      type: object
    immerle.SmartRulesDTO:
      properties:
        conditions:
          items:
            $ref: '#/components/schemas/immerle.SmartConditionDTO'
          type: array
          uniqueItems: false
        limit:
          example: 100
          type: integer
        match:
          example: all
          type: string
        order:
          example: desc
          type: string
        sort:
          example: playCount
          type: string
      type: object
    immerle.SubscribeRequestDTO:
      properties:
        instanceId:
          example: 3f1c2d4e-5a6b-7c8d-9e0f-1a2b3c4d5e6f
          type: string
        sqid:
          example: other-node
          type: string
      type: object
    immerle.ThemeDTO:
      properties:
        accentColor:
          example: '#3b82f6'
          type: string
      type: object
    immerle.TrackDTO:
      properties:
        album:
          example: Discovery
          type: string
        albumId:
          type: string
        artist:
          example: Daft Punk
          type: string
        artistId:
          type: string
        contentType:
          example: audio/flac
          type: string
        coverArt:
          type: string
        duration:
          example: 320
          type: integer
        genre:
          example: House
          type: string
        id:
          type: string
        size:
          example: 8123456
          type: integer
        suffix:
          example: flac
          type: string
        title:
          example: One More Time
          type: string
        track:
          example: 1
          type: integer
        year:
          example: 2001
          type: integer
      type: object
    immerle.TrackListDTO:
      properties:
        limit:
          example: 50
          type: integer
        offset:
          example: 0
          type: integer
        total:
          example: 1560
          type: integer
        tracks:
          items:
            $ref: '#/components/schemas/immerle.TrackDTO'
          type: array
          uniqueItems: false
      type: object
    immerle.UserDTO:
      properties:
        displayName:
          example: Kilian Smiti
          type: string
        id:
          type: string
        isAdmin:
          example: true
          type: boolean
        username:
          example: kilian
          type: string
      type: object
    immerle.WrappedCountDTO:
      properties:
        name:
          example: Daft Punk
          type: string
        plays:
          example: 120
          type: integer
      type: object
    immerle.WrappedDTO:
      properties:
        byMonth:
          items:
            type: integer
          type: array
          uniqueItems: false
        topArtists:
          items:
            $ref: '#/components/schemas/immerle.WrappedCountDTO'
          type: array
          uniqueItems: false
        topGenres:
          items:
            $ref: '#/components/schemas/immerle.WrappedCountDTO'
          type: array
          uniqueItems: false
        topTracks:
          items:
            $ref: '#/components/schemas/immerle.WrappedTrackDTO'
          type: array
          uniqueItems: false
        totalPlays:
          example: 1234
          type: integer
        totalSeconds:
          example: 987654
          type: integer
        year:
          example: 2025
          type: integer
      type: object
    immerle.WrappedTrackDTO:
      properties:
        artist:
          example: Daft Punk
          type: string
        id:
          type: string
        plays:
          example: 42
          type: integer
        title:
          example: One More Time
          type: string
      type: object
    immerle.addCollaboratorBody:
      properties:
        username:
          type: string
      type: object
    immerle.adminUserCreateRequest:
      properties:
        admin:
          type: boolean
        displayName:
          type: string
        email:
          type: string
        password:
          type: string
        username:
          type: string
      type: object
    immerle.adminUserUpdateRequest:
      properties:
        admin:
          type: boolean
        displayName:
          type: string
        email:
          type: string
        password:
          type: string
        scrobblingEnabled:
          type: boolean
      type: object
    immerle.adminUserView:
      properties:
        admin:
          type: boolean
        displayName:
          type: string
        email:
          type: string
        id:
          type: string
        scrobblingEnabled:
          type: boolean
        username:
          type: string
      type: object
    immerle.albumView:
      properties:
        artist:
          type: string
        artistId:
          type: string
        coverArt:
          type: string
        duration:
          type: integer
        genre:
          type: string
        id:
          type: string
        name:
          type: string
        songCount:
          type: integer
        starred:
          type: string
        tracks:
          items:
            $ref: '#/components/schemas/immerle.songView'
          type: array
          uniqueItems: false
        year:
          type: integer
      type: object
    immerle.apiError:
      properties:
        code:
          type: string
        fields:
          items:
            $ref: '#/components/schemas/immerle.fieldError'
          type: array
          uniqueItems: false
        message:
          type: string
        params:
          additionalProperties: {}
          description: i18n interpolation values; always present ({} when none)
          type: object
      type: object
    immerle.artistView:
      properties:
        albumCount:
          type: integer
        albums:
          items:
            $ref: '#/components/schemas/immerle.albumView'
          type: array
          uniqueItems: false
        coverArt:
          type: string
        id:
          type: string
        name:
          type: string
        starred:
          type: string
      type: object
    immerle.channelView:
      properties:
        description:
          type: string
        episodes:
          items:
            $ref: '#/components/schemas/immerle.episodeView'
          type: array
          uniqueItems: false
        error:
          type: string
        id:
          type: string
        imageUrl:
          type: string
        status:
          type: string
        title:
          type: string
        url:
          type: string
      type: object
    immerle.cleanupUpdateRequest:
      properties:
        enabled:
          type: boolean
      type: object
    immerle.createJamRequest:
      properties:
        name:
          type: string
        trackIds:
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    immerle.createTokenRequest:
      properties:
        expiresAt:
          description: >-
            ExpiresAt is an optional RFC3339 timestamp; omit or null for a token
            that

            never expires.
          type: string
        name:
          type: string
      type: object
    immerle.episodeView:
      properties:
        channelId:
          type: string
        contentType:
          type: string
        description:
          type: string
        duration:
          type: integer
        id:
          type: string
        publishDate:
          type: string
        size:
          type: integer
        status:
          type: string
        streamable:
          description: Streamable is true once the episode audio has been downloaded.
          type: boolean
        suffix:
          type: string
        title:
          type: string
      type: object
    immerle.errorResponse:
      properties:
        error:
          $ref: '#/components/schemas/immerle.apiError'
      type: object
    immerle.favoritesView:
      properties:
        albums:
          items:
            $ref: '#/components/schemas/immerle.albumView'
          type: array
          uniqueItems: false
        artists:
          items:
            $ref: '#/components/schemas/immerle.artistView'
          type: array
          uniqueItems: false
        songs:
          items:
            $ref: '#/components/schemas/immerle.songView'
          type: array
          uniqueItems: false
      type: object
    immerle.fieldError:
      properties:
        field:
          type: string
        message:
          type: string
      type: object
    immerle.friendRequestBody:
      properties:
        username:
          type: string
      type: object
    immerle.genreView:
      properties:
        albumCount:
          type: integer
        name:
          type: string
        songCount:
          type: integer
      type: object
    immerle.loginRequest:
      properties:
        device:
          description: >-
            Device is an optional human label for the session (defaults to the
            username).
          type: string
        password:
          type: string
        salt:
          type: string
        token:
          description: >-
            Token + Salt allow Subsonic-style token auth instead of a raw
            password.
          type: string
        username:
          type: string
      type: object
    immerle.lyricLine:
      properties:
        startMs:
          type: integer
        text:
          type: string
      type: object
    immerle.lyricsView:
      properties:
        lines:
          items:
            $ref: '#/components/schemas/immerle.lyricLine'
          type: array
          uniqueItems: false
        synced:
          type: boolean
      type: object
    immerle.nowPlayingView:
      properties:
        minutesAgo:
          type: integer
        song:
          $ref: '#/components/schemas/immerle.songView'
        username:
          type: string
      type: object
    immerle.participantView:
      properties:
        name:
          type: string
        role:
          type: string
      type: object
