              example: 30
              type: integer
          type: object
        providers:
          properties:
            autoDownloadOnPlay:
              example: true
              type: boolean
            searchTimeoutSeconds:
              example: 3
              type: integer
          type: object
        scan:
          properties:
            intervalSeconds:
              example: 3600
              type: integer
            watch:
              example: true
              type: boolean
          type: object
        server:
          properties:
            corsAllowedOrigins:
              example:
                - '*'
