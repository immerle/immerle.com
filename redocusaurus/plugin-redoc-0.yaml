              uniqueItems: false
          type: object
        transcode:
          properties:
            ffmpegPath:
              example: ffmpeg
              type: string
            ffprobePath:
              example: ffprobe
              type: string
            profiles:
              items:
                properties:
                  bitRate:
                    example: 192
                    type: integer
                  ffmpegArgs:
                    type: string
                  format:
                    example: mp3
                    type: string
                  name:
                    example: mp3
                    type: string
