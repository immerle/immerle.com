                $ref: '#/components/schemas/immerle.errorResponse'
          description: Forbidden
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Bad Gateway
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Service Unavailable
      security:
        - BearerAuth: []
      summary: Discover instances on the hub
      tags:
