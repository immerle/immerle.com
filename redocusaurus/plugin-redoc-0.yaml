  /setup:
    get:
      description: >-
        Unauthenticated. Reports whether the server still needs its first admin
        and whether a setup token is required.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.SetupStatusDTO'
          description: OK
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
      summary: First-run setup status
      tags:
        - setup
    post:
      description: >-
        Unauthenticated, one-shot. Creates the initial admin — the only way to
        bootstrap an account (no config/env provisioning). Self-locks once any
        user exists.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                - $ref: '#/components/schemas/immerle.SetupInitRequest'
                  summary: body
                  description: Initial admin credentials
        description: Initial admin credentials
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.UserDTO'
          description: Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: validation
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: invalid_setup_token
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: already_initialized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/immerle.errorResponse'
          description: Internal Server Error
      summary: Create the first administrator
      tags:
        - setup
